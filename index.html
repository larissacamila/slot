<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sloty</title>

<link rel="stylesheet" href="./style.css">
<script src="./script.js" defer></script>

<style>

body{
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    /* IMAGEM DE FUNDO */
    background-image:url("/static/img/fundo.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

/* container central */
#container{
    text-align:center;
}

/* BOTÃO SPIN GRANDE */
.start-button{
    margin-top:20px;
    padding:20px 60px;
    font-size:28px;
    font-weight:bold;
    border:none;
    border-radius:15px;
    cursor:pointer;

    color:white;
    background:linear-gradient(45deg,#ff0000,#ff8800);

    box-shadow:0 0 20px rgba(0,0,0,0.5);

    transition:0.2s;
}

.start-button:hover{
    transform:scale(1.1);
}

.start-button:active{
    transform:scale(0.95);
}

</style>

</head>

<body>

<div id="container">

<div class="window-border">
<div class="window">

<div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div>

<div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div>

<div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div>

<div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div>

<div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div>

<div class="outer-spacer"></div>

</div>
</div>

<input type="button" onclick="spin(this)" class="start-button" value="🎰 GIRAR"/>

</div>

</body>
</html>
