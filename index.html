<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🍓 Slot Frutas</title>

<link rel="stylesheet" href="/static/style.css">
<script src="/static/script.js" defer></script>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:url("items/fundo.jpg");
background-size:cover;
background-position:center;
font-family:Arial;
}

#painel{
text-align:center;
color:white;
font-size:22px;
margin-bottom:15px;
}

#saldo{
font-weight:bold;
color:#00ff88;
}

</style>

</head>

<body>

<div>

<div id="painel">
💰 Saldo: R$ <span id="saldo">{{saldo}}</span>
<br><br>

Aposta:
<input type="number" id="aposta" value="1" min="1" style="font-size:18px;width:80px;">
</div>


<div id="container">

<div class="window-border">
<div class="window">

<div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div>

<div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div>

<div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div>

<div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div>

<div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div>

<div class="outer-spacer"></div>

</div>
</div>

<input type="button" onclick="girar(this)" class="start-button" value="🎰 GIRAR">

</div>

</div>

<!-- SOM DO GIRO -->
<audio id="somGiro" src="/static/som/girar.mp3"></audio>

<script>

/* função que substitui spin() */

function girar(botao){

let aposta = document.getElementById("aposta").value

/* tocar som */

let audio = document.getElementById("somGiro")
audio.currentTime = 0
audio.play()

/* chama backend */

fetch("/api/spin",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
aposta:aposta
})
})
.then(res => res.json())
.then(data => {

setResult(data.resultado)

/* atualizar saldo */

document.getElementById("saldo").innerText = data.saldo

if(data.ganho > 0){
alert("🎉 Você ganhou R$ "+data.ganho)
}

})

spin(botao)

}

</script>

</body>
</html>
