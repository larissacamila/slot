<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🍓 Slot Frutas</title>

<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:url("items/fundo.jpg");
background-size:cover;
background-position:center;
font-family:Arial;
color:white;
}

/* PAINEL SUPERIOR */

#painel{
text-align:center;
margin-bottom:20px;
}

/* USUARIO */

#usuario{
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

/* SALDO */

#saldoBox{
font-size:40px;
font-weight:bold;
color:#00ff88;
margin-bottom:15px;
}

/* APOSTA */

#apostaBox{
font-size:26px;
}

#aposta{
font-size:26px;
width:120px;
text-align:center;
border-radius:8px;
border:none;
padding:5px;
}

/* BOTÃO */

.start-button{
margin-top:25px;
padding:25px 90px;
font-size:32px;
font-weight:bold;
border:none;
border-radius:12px;
cursor:pointer;
color:white;
background:linear-gradient(45deg,#ff0000,#ff8800);
box-shadow:0 0 20px rgba(0,0,0,0.7);
}

.start-button:hover{
transform:scale(1.1);
}

</style>

</head>

<body>

<div>

<div id="painel">

<div id="usuario">
👤 Olá, {{usuario}}
</div>

<div id="saldoBox">
💰 Saldo: R$ <span id="saldo">{{saldo}}</span>
</div>

<div id="apostaBox">
🎲 Aposta:
<input type="number" id="aposta" value="1" min="1">
</div>

</div>


<div id="container">

<div class="window-border">
<div class="window">

<div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div>

<div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div>

<div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div>

<div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div>

<div class="outer-spacer"></div>
<div class="outer-col"><div class="col"></div></div>

<div class="outer-spacer"></div>

</div>
</div>

<input type="button" onclick="girar(this)" class="start-button" value="🎰 GIRAR">

</div>

</div>

<audio id="somGiro" src="som/jogo2.mp3"></audio>

<script>

function girar(botao){

let aposta = document.getElementById("aposta").value

let audio = document.getElementById("somGiro")
audio.currentTime = 0
audio.play()

fetch("/api/spin",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
aposta:aposta
})
})
.then(res => res.json())
.then(data => {

setResult(data.resultado)

document.getElementById("saldo").innerText = data.saldo

if(data.ganho > 0){
alert("🎉 Você ganhou R$ "+data.ganho)
}

})

spin(botao)

}

</script>

</body>
</html>
